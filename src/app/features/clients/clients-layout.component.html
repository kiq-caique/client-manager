<div class="layout">
  <header class="topbar">
    <div class="topbar__brand">
      <mat-icon class="topbar__icon">people_alt</mat-icon>
      <span class="topbar__name font-mono">BOLT ClientManager</span>
    </div>

    <div class="topbar__actions">
      <button
        mat-icon-button
        class="topbar__theme-btn"
        (click)="toggleTheme()"
        [matTooltip]="(theme$ | async) === 'dark' ? 'Mudar para tema claro' : 'Mudar para tema escuro'"
        [attr.aria-label]="(theme$ | async) === 'dark' ? 'Ativar tema claro' : 'Ativar tema escuro'">
        <mat-icon>{{ (theme$ | async) === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <ng-container *ngIf="user$ | async as user">
        <span class="topbar__user text-muted">{{ user.name }}</span>
        <button mat-icon-button [matMenuTriggerFor]="menu" matTooltip="Opções">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Sair</span>
          </button>
        </mat-menu>
      </ng-container>
    </div>
  </header>

  <main class="layout__main">
    <router-outlet></router-outlet>
  </main>
</div>
