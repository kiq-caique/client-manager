<div class="layout">
  <header class="topbar">
    <div class="topbar__brand">
      <mat-icon class="topbar__icon">people_alt</mat-icon>
      <span class="topbar__name font-mono">ClientManager</span>
    </div>

    <div class="topbar__actions">
      <ng-container *ngIf="user$ | async as user">
        <span class="topbar__user text-muted">{{ user.name }}</span>
        <button mat-icon-button [matMenuTriggerFor]="menu" matTooltip="Opções">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Sair</span>
          </button>
        </mat-menu>
      </ng-container>
    </div>
  </header>

  <main class="layout__main">
    <router-outlet></router-outlet>
  </main>
</div>
